<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 5</title>

    <style>
        table {
            border-collapse: collapse;
        }

        td {
            border: 1px solid black;
            padding: 5px;
        }
    </style>
</head>
<body>

<div id="tableContainer"></div>

<script>
    let tableHTML = "";

    for (let i = 1; i <= 10; i++) {

        tableHTML += "<tr>";

        for (let j = 1; j <= 10; j++) {
            tableHTML +=
                "<td>" +
                i + " × " + j + " = " + (i * j) +
                "</td>";
        }

        tableHTML += "</tr>";
    }

    document.getElementById("tableContainer").innerHTML =
        "<table>" + tableHTML + "</table>";
</script>

</body>
</html>
