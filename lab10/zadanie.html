<!DOCTYPE html>
 <html>
  <head>
  <meta charset="utf-8">
  <title>форма регистрации</title>
 </head>
 <body>
  <form name="forma1">
   Форма регистрации:<br><br>
   Имя:<br>
   <input type="text" name="name"><br>
   e-mail:<br>
   <input type="text" name="email"><br>
   Пароль:<br>
   <input type="password" name"pass"><br>
   Повтор пароля:<br>
   <input type=password" name="pass2"><br>
   Пол:<br>
   <input type="radio" name="pol" value="M" checked>мужской
   <input type="radio" name="pol" value="Ж">женский
   <br><br>
   Увлечения:<br>
   <select name="hobby" size="7" multiple>
    <option>компьютеры</option>
    <option>спорт</option>
    <option>игры</option>
    <option>животные</option>
    <option>автомобили</option>
    <option>клубы</option>
    <option>музыка</option>
    </select>
    <br><br>
    Ваши пожелания:<br>
    <textarea name="comment" rows="4" cols="30"></textarea>
    <br><br>
    <input type="submit" value="Oтправить">
    <input type="reset" value="Очистить">
   </form>
  </body>
 </html>
