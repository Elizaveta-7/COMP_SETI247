<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 1</title>
</head>
<body>

<div id="result"></div>

<script>
    let books = [
        "Гарри Поттер",
        "Властелин колец",
        "Мастер и Маргарита",
        "1984",
        "Шерлок Холмс"
    ];

    let result = document.getElementById("result");

    if (books.length === 0) {
        result.textContent = "Список пуст";
    } else {
        let html = "<ol>";

        for (let i = 0; i < books.length; i++) {
            html += "<li>" + books[i] + "</li>";
        }

        html += "</ol>";
        result.innerHTML = html;
    }
</script>

</body>
</html>
